<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Responsável - Pontua+</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--azul-royal) 0%, var(--roxo-vibrante) 100%);
            padding: 20px;
        }
        .registro-container {
            background: var(--branco);
            border-radius: 16px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 540px;
        }
        .registro-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .registro-header h1 {
            background: linear-gradient(135deg, var(--azul-royal) 0%, var(--roxo-vibrante) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .registro-header p { color: var(--cinza-escuro); font-size: 15px; }
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; display: none; font-size: 14px; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="registro-container">
        <div class="registro-header">
            <img src="/img/logopreto.png" alt="Pontua+" style="height:48px; margin-bottom:16px;">
            <h1>Cadastro de Responsável</h1>
            <p>Crie sua conta para acompanhar o desempenho do seu filho</p>
        </div>

        <div id="alert" class="alert"></div>

        <form id="registroForm">
            <div class="form-group">
                <label for="nome">Nome completo *</label>
                <input type="text" id="nome" name="nome" class="form-control" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">E-mail *</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="cpf">CPF *</label>
                    <input type="text" id="cpf" name="cpf" class="form-control" placeholder="000.000.000-00" required>
                </div>
            </div>

            <div class="form-group">
                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" name="telefone" class="form-control" placeholder="(00) 00000-0000">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="senha">Senha *</label>
                    <input type="password" id="senha" name="senha" class="form-control" minlength="6" required>
                </div>
                <div class="form-group">
                    <label for="confirmarSenha">Confirmar senha *</label>
                    <input type="password" id="confirmarSenha" name="confirmarSenha" class="form-control" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;">
                Criar Conta
            </button>
        </form>

        <p style="text-align:center; margin-top:16px; font-size:14px; color: var(--cinza-escuro);">
            Já tem conta? <a href="/login.html" style="color: var(--azul-royal);">Entrar</a>
        </p>
    </div>

    <script>
        document.getElementById('cpf').addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, '');
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            e.target.value = v;
        });

        document.getElementById('registroForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const senha = document.getElementById('senha').value;
            const confirmarSenha = document.getElementById('confirmarSenha').value;

            if (senha !== confirmarSenha) {
                showAlert('As senhas não coincidem!', 'error');
                return;
            }

            const dados = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                senha: senha,
                cpf: document.getElementById('cpf').value.replace(/\D/g, ''),
                telefone: document.getElementById('telefone').value || null
            };

            try {
                const response = await fetch('/api/registro/responsavel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                const result = await response.json();

                if (response.ok) {
                    showAlert(result.success + ' ' + result.message, 'success');
                    setTimeout(() => { window.location.href = '/login.html'; }, 2000);
                } else {
                    showAlert(result.error || 'Erro ao realizar cadastro', 'error');
                }
            } catch (error) {
                showAlert('Erro ao realizar cadastro. Tente novamente.', 'error');
            }
        });

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>

</body>
</html>
