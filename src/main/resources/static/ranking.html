<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking - Pontua+</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body style="background: var(--cinza-claro);">
    <div class="header">
        <img src="/img/logopreto.png" alt="Pontua+" class="header-logo">
        <nav class="nav-menu">
            <a href="/dashboard.html" class="nav-link">Desempenho</a>
            <a href="/ranking.html" class="nav-link active">Ranking</a>
            <a href="/recompensas.html" class="nav-link">Recompensas</a>
            <a href="/eventos.html" class="nav-link">Eventos</a>
            <span class="nav-link disabled">Acessibilidade</span>
        </nav>
        <div class="user-info">
            <a href="/perfil.html" class="user-avatar" id="userAvatar" style="text-decoration:none;">M</a>
        </div>
    </div>

    <div class="container">
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Carregando ranking...</p>
        </div>

        <div id="rankingContent" style="display: none;">
            <div class="card card-glass" style="margin-bottom: 24px;">
                <h2 class="text-gradient" style="margin-bottom: 4px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:8px;">
                        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
                        <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
                        <path d="M4 22h16"/>
                        <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
                        <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
                        <path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/>
                    </svg>
                    Ranking de Estudantes
                </h2>
                <p style="color:var(--cinza-escuro);margin:0;" id="rankingSubtitle">Você está no nível...</p>
            </div>

            <div id="tiersContainer"></div>
        </div>
    </div>

    <script src="/js/ranking.js"></script>
</body>
</html>
